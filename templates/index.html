<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>faLei</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #64748b;
            font-weight: 400;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
        }

        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #475569;
        }

        input[type="url"] {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: all 0.2s;
            background: #f8fafc;
        }

        input[type="url"]:focus {
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            width: 100%;
            padding: 18px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .btn-download {
            background: #10b981;
            color: white;
            margin-top: 15px;
            display: none;
        }

        .btn-download:hover {
            background: #059669;
        }

        .btn-download.active {
            display: block;
        }

        /* Progress Bar */
        .progress-box {
            display: none;
            margin-top: 25px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
        }

        .progress-box.active {
            display: block;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
        }

        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #2563eb;
            width: 0%;
            transition: width 0.3s ease;
        }

        .status-text {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #2563eb;
            font-weight: 500;
        }

        /* Error */
        .error-msg {
            display: none;
            margin-top: 20px;
            padding: 12px;
            background: #fef2f2;
            color: #ef4444;
            border-radius: 8px;
            font-size: 0.9rem;
            border: 1px solid #fee2e2;
        }

        .error-msg.active {
            display: block;
        }

        /* Área do texto humanizado */
        .text-preview {
            display: none;
            margin-top: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            text-align: left;
        }

        .text-preview.active {
            display: block;
        }

        .text-preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            user-select: none;
        }

        .text-preview-header:hover {
            background: #f1f5f9;
        }

        .text-preview-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .text-preview-actions {
            display: flex;
            gap: 8px;
        }

        .btn-copy {
            padding: 4px 12px;
            background: #e2e8f0;
            color: #475569;
            border: none;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-copy:hover {
            background: #cbd5e1;
        }

        .btn-copy.copied {
            background: #bbf7d0;
            color: #166534;
        }

        .chevron {
            font-size: 0.7rem;
            color: #94a3b8;
            transition: transform 0.2s;
        }

        .chevron.open {
            transform: rotate(180deg);
        }

        .text-preview-body {
            display: none;
            max-height: 340px;
            overflow-y: auto;
            padding: 16px;
            background: white;
        }

        .text-preview-body.open {
            display: block;
        }

        .text-preview-body p {
            font-size: 0.875rem;
            line-height: 1.75;
            color: #334155;
            white-space: pre-wrap;
            margin: 0;
        }

        .footer-link {
            display: inline-block;
            margin-top: 30px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: #2563eb;
        }

        /* Banner de login do Gemini */
        .gemini-banner {
            display: none;
            margin-bottom: 20px;
            padding: 14px 18px;
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 12px;
            text-align: left;
            align-items: center;
            gap: 12px;
        }

        .gemini-banner.active {
            display: flex;
        }

        .gemini-banner p {
            flex: 1;
            font-size: 0.88rem;
            color: #92400e;
            margin: 0;
        }

        .btn-gemini-login {
            flex-shrink: 0;
            padding: 8px 16px;
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-gemini-login:hover {
            background: #d97706;
        }

        /* Badge de status do Gemini */
        .gemini-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 999px;
            margin-bottom: 16px;
        }

        .gemini-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .gemini-status.ready {
            background: #dcfce7;
            color: #166534;
        }

        .gemini-status.ready .dot {
            background: #16a34a;
        }

        .gemini-status.offline {
            background: #fef3c7;
            color: #92400e;
        }

        .gemini-status.offline .dot {
            background: #f59e0b;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <span class="logo">⚖️</span>
            <h1>Leis para Áudio</h1>
            <p class="subtitle">Transforme textos legislativos em áudio humanizado.</p>
            <span class="gemini-status offline" id="geminiStatus">
                <span class="dot"></span>
                <span id="geminiStatusText">Gemini: verificando...</span>
            </span>
        </div>

        <!-- Banner de login (visível enquanto o Gemini não estiver autenticado) -->
        <div class="gemini-banner" id="geminiBanner">
            <p>🔑 <strong>Faça login no Gemini</strong> para habilitar a humanização do texto.</p>
            <button class="btn-gemini-login" onclick="openGemini()">Abrir Gemini</button>
        </div>

        <div class="card">
            <div class="input-group">
                <label class="input-label" for="url">Cole a URL da Lei (.html)</label>
                <input type="url" id="url" placeholder="https://..." autofocus required>
            </div>

            <button class="btn btn-primary" id="processBtn" onclick="processLaw()">
                Converter para Áudio
            </button>

            <div class="progress-box" id="progressContainer">
                <div class="progress-header">
                    <span>Processando</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="status-text" id="statusMessage">Iniciando...</div>
            </div>

            <button class="btn btn-download" id="downloadBtn" onclick="downloadAudio()">
                📥 Baixar ZIP (Áudio + Texto)
            </button>

            <!-- Audio Player -->
            <div id="audioPlayerContainer" style="display: none; margin-top: 20px; text-align: center;">
                <p style="font-size: 0.9rem; font-weight: 600; color: #475569; margin-bottom: 8px;">Ouça o áudio da lei:
                </p>
                <audio id="audioPlayer" controls style="width: 100%; outline: none; border-radius: 8px;"></audio>
            </div>

            <!-- Visualizador do texto humanizado -->
            <div class="text-preview" id="textPreview">
                <div class="text-preview-header" onclick="toggleText()">
                    <span class="text-preview-title">📄 <span>Texto humanizado</span></span>
                    <div class="text-preview-actions">
                        <button class="btn-copy" id="copyBtn" onclick="copyText(event)">Copiar</button>
                        <span class="chevron" id="chevron">▼</span>
                    </div>
                </div>
                <div class="text-preview-body" id="textBody">
                    <p id="textContent">Carregando...</p>
                </div>
            </div>

            <div class="error-msg" id="errorMessage"></div>
        </div>

        <a href="/history" class="footer-link">Ver Histórico de Processamentos →</a>
    </div>

    <script>
        let currentJobId = null;
        let statusInterval = null;

        // ── Gemini Status ──────────────────────────────────────
        async function checkGeminiStatus() {
            try {
                const r = await fetch('http://127.0.0.1:5001/health');
                if (!r.ok) throw new Error();
                const data = await r.json();
                const ready = data.geminiReady === true;
                const badge = document.getElementById('geminiStatus');
                const text = document.getElementById('geminiStatusText');
                const banner = document.getElementById('geminiBanner');

                badge.className = 'gemini-status ' + (ready ? 'ready' : 'offline');
                text.textContent = ready ? 'Gemini: pronto ✓' : 'Gemini: aguardando login';
                banner.classList.toggle('active', !ready);
            } catch {
                // Bridge ainda não disponível (abrindo pelo browser sem Electron)
            }
        }

        function openGemini() {
            // Se estiver rodando dentro do Electron usa a API nativa;
            // senão, abre a rota bridge
            if (window.electronAPI && window.electronAPI.openGemini) {
                window.electronAPI.openGemini();
            } else {
                fetch('http://127.0.0.1:5001/open-gemini').catch(() => { });
            }
        }

        // Verifica o status do Gemini a cada 5 segundos
        checkGeminiStatus();
        setInterval(checkGeminiStatus, 5000);
        // ────────────────────────────────────────────────────────

        async function processLaw() {
            const url = document.getElementById('url').value.trim();

            if (!url) {
                showError('Por favor, informe a URL da lei.');
                return;
            }

            // Reset UI
            document.getElementById('processBtn').disabled = true;
            document.getElementById('processBtn').textContent = 'Processando...';
            document.getElementById('progressContainer').classList.add('active');
            document.getElementById('downloadBtn').classList.remove('active');
            document.getElementById('errorMessage').classList.remove('active');

            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Falha ao iniciar processamento');
                }

                const data = await response.json();

                if (data.is_duplicate) {
                    // Tratar duplicata sem iniciar pooling e sem Job inútil no backend
                    document.getElementById('statusMessage').innerHTML = '⚠️ <strong>' + data.message + '</strong>';
                    document.getElementById('progressFill').style.background = '#f59e0b';
                    document.getElementById('progressFill').style.width = '100%';
                    document.getElementById('progressPercent').textContent = '100%';
                    document.getElementById('downloadBtn').classList.add('active');

                    const btn = document.getElementById('processBtn');
                    btn.disabled = false;
                    btn.textContent = 'Converter Outra Lei';

                    currentJobId = data.original_job_id;
                    showAudio(currentJobId);

                    try {
                        const r = await fetch(`/job-text/${currentJobId}`);
                        const textData = await r.json();
                        if (textData.text) {
                            document.getElementById('textContent').textContent = textData.text;
                            document.getElementById('textPreview').classList.add('active');
                            toggleText(true);
                        }
                    } catch (e) { }

                } else {
                    // Lei inédita: iniciar pooling
                    currentJobId = data.job_id;
                    document.getElementById('statusMessage').textContent = 'Buscando lei...';
                    statusInterval = setInterval(checkStatus, 1000);
                }

            } catch (error) {
                showError(error.message);
                resetUI();
            }
        }

        async function checkStatus() {
            if (!currentJobId) return;

            try {
                const response = await fetch(`/status/${currentJobId}`);
                if (!response.ok) throw new Error('Erro de conexão');

                const job = await response.json();

                document.getElementById('progressFill').style.width = job.progress + '%';
                document.getElementById('progressPercent').textContent = job.progress + '%';
                document.getElementById('statusMessage').textContent = job.message;

                if (job.status === 'complete') {
                    finishJob();
                } else if (job.status === 'error') {
                    clearInterval(statusInterval);
                    showError(job.message || job.error);
                    resetUI();
                }

            } catch (error) {
                console.error(error);
                // Não para o intervalo imediatamente em erro de rede, tenta de novo
            }
        }

        async function finishJob() {
            clearInterval(statusInterval);
            document.getElementById('statusMessage').textContent = 'Concluído!';
            document.getElementById('progressFill').style.background = '#10b981';
            document.getElementById('downloadBtn').classList.add('active');

            // Restore button state
            const btn = document.getElementById('processBtn');
            btn.disabled = false;
            btn.textContent = 'Converter Outra Lei';

            showAudio(currentJobId);

            // Carregar e exibir o texto humanizado
            try {
                const r = await fetch(`/job-text/${currentJobId}`);
                const data = await r.json();
                if (data.text) {
                    document.getElementById('textContent').textContent = data.text;
                    document.getElementById('textPreview').classList.add('active');
                    // Abre já expandido
                    toggleText(true);
                }
            } catch (e) {
                console.warn('Não foi possível carregar o texto:', e);
            }
        }

        function toggleText(forceOpen) {
            const body = document.getElementById('textBody');
            const chevron = document.getElementById('chevron');
            const isOpen = body.classList.contains('open');
            const open = forceOpen !== undefined ? forceOpen : !isOpen;
            body.classList.toggle('open', open);
            chevron.classList.toggle('open', open);
        }

        async function copyText(e) {
            e.stopPropagation();
            const text = document.getElementById('textContent').textContent;
            if (!text || text === 'Carregando...') return;
            try {
                await navigator.clipboard.writeText(text);
                const btn = document.getElementById('copyBtn');
                btn.textContent = 'Copiado ✓';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
            } catch (e) {
                console.warn('Clipboard não disponível:', e);
            }
        }

        function downloadAudio() {
            if (currentJobId) window.location.href = `/download_zip/${currentJobId}`;
        }

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.classList.add('active');
        }

        function showAudio(jobId) {
            const playerContainer = document.getElementById('audioPlayerContainer');
            const player = document.getElementById('audioPlayer');
            player.src = `/audio/${jobId}`;
            playerContainer.style.display = 'block';
        }

        function resetUI() {
            clearInterval(statusInterval);
            const btn = document.getElementById('processBtn');
            btn.disabled = false;
            btn.textContent = 'Converter para Áudio';
            document.getElementById('progressContainer').classList.remove('active');
            document.getElementById('textPreview').classList.remove('active');
            document.getElementById('textBody').classList.remove('open');
            document.getElementById('chevron').classList.remove('open');
            document.getElementById('textContent').textContent = 'Carregando...';
            document.getElementById('audioPlayerContainer').style.display = 'none';
            document.getElementById('audioPlayer').pause();
        }

        // Enter key to submit
        document.getElementById('url').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') processLaw();
        });
    </script>
</body>

</html>
